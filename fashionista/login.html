<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fashionista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
/* ===== CSS RESET ===== */
*, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* ===== DESIGN TOKENS ===== */
:root {
    /* Colors - Pastel Luxury Palette */
    --color-black: #000000;
    --color-white: #FFFFFF;
    --color-blush: #F4E4E6;
    --color-sage: #D4E4D8;
    --color-lavender: #E6E4F4;
    --color-cream: #F8F6F0;
    --color-rose: #E8D4D8;
    --color-accent: #C9A0A8;
    --color-text-primary: #1A1A1A;
    --color-text-secondary: #6A6A6A;
    
    /* Typography */
    --font-primary: 'Bodoni Moda', 'Didot', serif;
    --font-secondary: 'Montserrat', 'Helvetica Neue', sans-serif;
    
    /* Spacing - Airy Whitespace */
    --space-xs: 0.5rem;
    --space-sm: 1rem;
    --space-md: 1.5rem;
    --space-lg: 2.5rem;
    --space-xl: 4rem;
    --space-2xl: 5rem;
    --space-3xl: 8rem;
    
    /* Animation */
    --duration-fast: 150ms;
    --duration-base: 300ms;
    --duration-slow: 400ms;
    --ease-elegant: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ===== BASE STYLES ===== */
html {
    font-size: 16px;
    scroll-behavior: smooth;
}

body {
    font-family: var(--font-secondary);
    color: var(--color-text-primary);
    line-height: 1.6;
    background-color: var(--color-white);
    overflow-x: hidden;
}

img {
    max-width: 100%;
    display: block;
    height: auto;
}

a {
    text-decoration: none;
    color: inherit;
    transition: opacity var(--duration-base) var(--ease-elegant);
}

a:hover {
    opacity: 0.7;
}

button {
    font-family: inherit;
    border: none;
    background: none;
    cursor: pointer;
    transition: all var(--duration-base) var(--ease-elegant);
}

.container {
    max-width: 1536px;
    margin: 0 auto;
    padding: 0 var(--space-lg);
}

@media (min-width: 768px) {
    .container {
        padding: 0 var(--space-2xl);
    }
}

/* ===== NAVIGATION ===== */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background-color: var(--color-white);
    z-index: 1000;
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.nav-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md) var(--space-lg);
    max-width: 1536px;
    margin: 0 auto;
}

.nav-logo {
    font-family: var(--font-primary);
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.nav-hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: var(--space-xs);
}

.nav-hamburger span {
    width: 24px;
    height: 2px;
    background-color: var(--color-black);
    transition: all var(--duration-base) var(--ease-elegant);
}

.nav-icons {
    display: flex;
    gap: var(--space-md);
    align-items: center;
}

.nav-icon {
    position: relative;
    padding: var(--space-xs);
    display: flex;
    align-items: center;
    justify-content: center;
}

.nav-badge {
    position: absolute;
    top: 0;
    right: 0;
    background-color: var(--color-accent);
    color: var(--color-white);
    font-size: 0.625rem;
    font-weight: 600;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== MOBILE MENU ===== */
.mobile-menu {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background-color: var(--color-cream);
    z-index: 2000;
    transform: translateX(-100%);
    transition: transform var(--duration-slow) var(--ease-elegant);
}

.mobile-menu.active {
    transform: translateX(0);
}

.mobile-menu-content {
    padding: var(--space-xl) var(--space-lg);
    height: 100%;
    display: flex;
    flex-direction: column;
}

.mobile-menu-close {
    align-self: flex-end;
    font-size: 3rem;
    line-height: 1;
    color: var(--color-text-primary);
    margin-bottom: var(--space-xl);
}

.mobile-menu-nav {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
}

.mobile-menu-link {
    font-family: var(--font-primary);
    font-size: 2rem;
    letter-spacing: 0.05em;
}

/* ===== HERO SECTION ===== */
.hero {
    height: 100vh;
    background: linear-gradient(135deg, var(--color-blush) 0%, var(--color-lavender) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-top: 72px;
}

.hero-content {
    text-align: center;
    padding: var(--space-lg);
}

.hero-title {
    font-family: var(--font-primary);
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
    line-height: 1.1;
}

.hero-subtitle {
    font-size: clamp(1rem, 2vw, 1.5rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: var(--space-xl);
    color: var(--color-text-secondary);
}

.hero-cta {
    display: inline-block;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.hero-cta:hover {
    transform: scale(0.98);
    opacity: 1;
}

.hero-scroll {
    position: absolute;
    bottom: var(--space-xl);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-xs);
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-10px); }
}

/* ===== SECTION TITLE ===== */
.section-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: var(--space-2xl);
}

/* ===== FEATURED COLLECTION ===== */
.featured {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
}

.carousel {
    position: relative;
}

.carousel-track {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .carousel-track {
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-xl);
    }
}

.product-card {
    position: relative;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.product-card:hover {
    transform: translateY(-8px);
}

.product-image {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background-color: var(--color-cream);
    margin-bottom: var(--space-md);
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--duration-slow) var(--ease-elegant);
}

.product-card:hover .product-image img {
    transform: scale(1.05);
}

.product-wishlist {
    position: absolute;
    top: var(--space-md);
    right: var(--space-md);
    width: 44px;
    height: 44px;
    background-color: var(--color-white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity var(--duration-base) var(--ease-elegant);
    z-index: 10;
}

.product-card:hover .product-wishlist {
    opacity: 1;
}

.product-quickview {
    position: absolute;
    bottom: var(--space-md);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    padding: var(--space-sm) var(--space-lg);
    background-color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all var(--duration-base) var(--ease-elegant);
    white-space: nowrap;
}

.product-card:hover .product-quickview {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.product-info {
    text-align: center;
}

.product-name {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-xs);
}

.product-price {
    font-size: 1rem;
    color: var(--color-text-secondary);
}

.carousel-dots {
    display: flex;
    justify-content: center;
    gap: var(--space-sm);
    margin-top: var(--space-xl);
}

.carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--color-text-secondary);
    opacity: 0.3;
    transition: all var(--duration-base) var(--ease-elegant);
}

.carousel-dot.active {
    width: 24px;
    border-radius: 4px;
    opacity: 1;
    background-color: var(--color-accent);
}

/* ===== CATEGORIES ===== */
.categories {
    padding: var(--space-3xl) 0;
    background-color: var(--color-cream);
}

.category-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

@media (min-width: 768px) {
    .category-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-lg);
    }
}

.category-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    display: block;
}

.category-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--duration-slow) var(--ease-elegant);
}

.category-card:hover img {
    transform: scale(1.1);
}

.category-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    display: flex;
    align-items: flex-end;
    padding: var(--space-lg);
}

.category-title {
    font-family: var(--font-primary);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--color-white);
}

/* ===== NEW ARRIVALS ===== */
.new-arrivals {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
}

.section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-2xl);
}

.section-link {
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 4px;
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .product-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-xl);
    }
}

.product-badge {
    position: absolute;
    top: var(--space-md);
    left: var(--space-md);
    padding: var(--space-xs) var(--space-md);
    background-color: var(--color-white);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    z-index: 10;
}

.product-badge.bestseller {
    background-color: var(--color-accent);
    color: var(--color-white);
}

.product-rating {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    margin-top: var(--space-xs);
    font-size: 0.875rem;
}

.stars {
    color: var(--color-accent);
    letter-spacing: 2px;
}

.rating-count {
    color: var(--color-text-secondary);
    font-size: 0.75rem;
}

/* ===== LIMITED EDITION ===== */
.limited-edition {
    min-height: 600px;
    background: linear-gradient(135deg, var(--color-rose) 0%, var(--color-blush) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-3xl) var(--space-lg);
    text-align: center;
}

@media (min-width: 768px) {
    .limited-edition {
        min-height: 700px;
    }
}

.limited-content {
    max-width: 600px;
}

.limited-label {
    display: inline-block;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-md);
}

.limited-title {
    font-family: var(--font-primary);
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
    line-height: 1.1;
}

.limited-description {
    font-size: 1.125rem;
    line-height: 1.8;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-lg);
}

.limited-price {
    font-family: var(--font-primary);
    font-size: 2rem;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-xl);
}

.limited-cta {
    display: inline-block;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.limited-cta:hover {
    transform: scale(0.98);
    opacity: 1;
}

/* ===== BESTSELLERS ===== */
.bestsellers {
    padding: var(--space-3xl) 0;
    background-color: var(--color-cream);
}

/* ===== SHOP BY STYLE ===== */
.shop-by-style {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
}

.style-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
}

@media (min-width: 768px) {
    .style-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-lg);
    }
}

.style-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    display: block;
}

.style-card-large {
    grid-row: span 2;
}

@media (max-width: 767px) {
    .style-card-large {
        grid-row: span 1;
    }
}

.style-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--duration-slow) var(--ease-elegant);
}

.style-card:hover img {
    transform: scale(1.08);
}

.style-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: var(--space-lg);
    transition: background var(--duration-base) var(--ease-elegant);
}

.style-card:hover .style-overlay {
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
}

.style-title {
    font-family: var(--font-primary);
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--color-white);
    margin-bottom: var(--space-xs);
}

.style-description {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.8);
    letter-spacing: 0.05em;
}

/* ===== EDITORIAL SECTION ===== */
.editorial {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 600px;
}

@media (min-width: 768px) {
    .editorial {
        grid-template-columns: 1fr 1fr;
        min-height: 700px;
    }
}

.editorial-image {
    position: relative;
    overflow: hidden;
}

.editorial-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.editorial-content {
    background-color: var(--color-sage);
    padding: var(--space-2xl) var(--space-lg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .editorial-content {
        padding: var(--space-3xl);
    }
}

.editorial-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    line-height: 1.2;
}

.editorial-text {
    font-size: 1.125rem;
    line-height: 1.8;
    color: var(--color-text-secondary);
}

.editorial-link {
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 4px;
    align-self: flex-start;
}

/* ===== NEWSLETTER ===== */
.newsletter {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
    text-align: center;
}

.newsletter-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
}

.newsletter-text {
    font-size: 1rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xl);
}

.newsletter-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    max-width: 500px;
    margin: 0 auto;
}

@media (min-width: 768px) {
    .newsletter-form {
        flex-direction: row;
    }
}

.newsletter-input {
    flex: 1;
    padding: var(--space-md) var(--space-lg);
    border: 1px solid var(--color-text-secondary);
    font-family: inherit;
    font-size: 1rem;
    transition: border-color var(--duration-base) var(--ease-elegant);
}

.newsletter-input:focus {
    outline: none;
    border-color: var(--color-black);
}

.newsletter-button {
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.newsletter-button:hover {
    transform: scale(0.98);
}

/* ===== FOOTER ===== */
.footer {
    background-color: var(--color-black);
    color: var(--color-white);
    padding: var(--space-3xl) 0 var(--space-xl);
}

.footer-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
    margin-bottom: var(--space-2xl);
}

@media (min-width: 768px) {
    .footer-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

.footer-title {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
}

.footer-links {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
}

.footer-links a {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.7);
    transition: color var(--duration-base) var(--ease-elegant);
}

.footer-links a:hover {
    color: var(--color-white);
    opacity: 1;
}

.footer-social {
    display: flex;
    gap: var(--space-md);
}

.footer-social a {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    transition: all var(--duration-base) var(--ease-elegant);
}

.footer-social a:hover {
    border-color: var(--color-white);
    background-color: rgba(255, 255, 255, 0.1);
    opacity: 1;
}

.footer-bottom {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    align-items: center;
    padding-top: var(--space-xl);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

@media (min-width: 768px) {
    .footer-bottom {
        flex-direction: row;
        justify-content: space-between;
    }
}

.footer-copyright {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.5);
}

.footer-payment {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.5);
}


/* ===== SPLIT HERO SECTION ===== */
.hero-split {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
    margin-top: 72px;
}

@media (min-width: 768px) {
    .hero-split {
        grid-template-columns: 1fr 1fr;
    }
}

.hero-split-image {
    position: relative;
    overflow: hidden;
    min-height: 50vh;
}

@media (min-width: 768px) {
    .hero-split-image {
        min-height: 100vh;
    }
}

.hero-split-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hero-split-content {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-2xl) var(--space-lg);
    background-color: var(--color-cream);
}

@media (min-width: 768px) {
    .hero-split-content {
        padding: var(--space-3xl);
    }
}

.hero-split-inner {
    max-width: 500px;
}

.hero-label {
    display: inline-block;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--color-accent);
    margin-bottom: var(--space-md);
}

.hero-description {
    font-size: 1.125rem;
    line-height: 1.8;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xl);
}

.hero-features {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
    margin-bottom: var(--space-xl);
}

.hero-feature {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: 0.875rem;
}

.feature-icon {
    width: 24px;
    height: 24px;
    background-color: var(--color-accent);
    color: var(--color-white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
}

.hero-actions {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

@media (min-width: 768px) {
    .hero-actions {
        flex-direction: row;
    }
}

.hero-cta-primary {
    display: inline-block;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    text-align: center;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.hero-cta-primary:hover {
    transform: scale(0.98);
    opacity: 1;
}

.hero-cta-secondary {
    display: inline-block;
    padding: var(--space-md) var(--space-xl);
    background-color: transparent;
    color: var(--color-black);
    border: 1px solid var(--color-black);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    text-align: center;
    transition: all var(--duration-base) var(--ease-elegant);
}

.hero-cta-secondary:hover {
    background-color: var(--color-black);
    color: var(--color-white);
    opacity: 1;
}


/* ===== ASYMMETRIC HERO SECTION ===== */
.hero-asymmetric {
    display: grid;
    grid-template-columns: 1fr;
    min-height: 100vh;
    margin-top: 72px;
    background: linear-gradient(135deg, var(--color-blush) 0%, var(--color-lavender) 100%);
}

@media (min-width: 768px) {
    .hero-asymmetric {
        grid-template-columns: 45% 55%;
    }
}

.hero-asymmetric-content {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-2xl) var(--space-lg);
}

@media (min-width: 768px) {
    .hero-asymmetric-content {
        padding: var(--space-3xl);
    }
}

.hero-asymmetric-text {
    max-width: 500px;
}

.hero-asymmetric-products {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-lg);
    padding: var(--space-lg);
}

@media (min-width: 768px) {
    .hero-asymmetric-products {
        grid-template-columns: 1fr 1fr;
        padding: var(--space-2xl);
    }
}

.hero-product-large {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    transition: transform var(--duration-base) var(--ease-elegant);
}

@media (min-width: 768px) {
    .hero-product-large {
        grid-row: span 2;
    }
}

.hero-product-large:hover {
    transform: translateY(-8px);
}

.hero-product-large img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    min-height: 400px;
}

.hero-product-grid {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: var(--space-lg);
}

.hero-product-small {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.hero-product-small:hover {
    transform: translateY(-8px);
}

.hero-product-small img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    min-height: 250px;
}

.hero-product-info {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: var(--space-lg);
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    color: var(--color-white);
}

.hero-product-info h3 {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-xs);
}

.hero-product-info p {
    font-size: 1rem;
    opacity: 0.9;
}


/* ===== HORIZONTAL SCROLL LAYOUT ===== */
.horizontal-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.horizontal-scroll::-webkit-scrollbar {
    display: none;
}

.horizontal-scroll-track {
    display: flex;
    gap: var(--space-lg);
    padding-bottom: var(--space-md);
}

.horizontal-scroll-track .product-card {
    flex: 0 0 280px;
}

@media (min-width: 768px) {
    .horizontal-scroll-track .product-card {
        flex: 0 0 320px;
    }
}

/* ===== THREE COLUMN GRID ===== */
.product-grid-three {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .product-grid-three {
        grid-template-columns: repeat(3, 1fr);
        gap: var(--space-xl);
    }
}

/* ===== LARGE CARD LAYOUT ===== */
.category-grid-large {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 768px) {
    .category-grid-large {
        grid-template-columns: repeat(2, 1fr);
    }
}

.category-card-large {
    aspect-ratio: 16/9;
}

.category-card-large .category-title {
    font-size: 3rem;
}

/* ===== FEATURED ASYMMETRIC GRID ===== */
.featured-asymmetric {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .featured-asymmetric {
        grid-template-columns: 2fr 1fr 1fr;
        gap: var(--space-xl);
    }
    
    .featured-asymmetric .product-card:first-child {
        grid-row: span 2;
    }
}

/* ===== FULL WIDTH SHOWCASE ===== */
.showcase-fullwidth {
    display: grid;
    grid-template-columns: 1fr;
}

@media (min-width: 768px) {
    .showcase-fullwidth {
        grid-template-columns: 2fr 1fr;
        gap: var(--space-xl);
    }
}

.showcase-main {
    position: relative;
    min-height: 600px;
}

.showcase-sidebar {
    display: grid;
    grid-template-rows: repeat(2, 1fr);
    gap: var(--space-lg);
}


/* ===== CATEGORY DESCRIPTION ===== */
.category-description {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.8);
    margin-top: var(--space-xs);
    letter-spacing: 0.05em;
}

.category-count {
    font-size: 0.875rem;
    color: rgba(255, 255, 255, 0.9);
    margin-top: var(--space-xs);
}

/* ===== ASYMMETRIC CATEGORY GRID ===== */
.category-grid-asymmetric {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-lg);
}

@media (min-width: 768px) {
    .category-grid-asymmetric {
        grid-template-columns: 2fr 1fr 1fr;
        gap: var(--space-xl);
    }
    
    .category-card-featured {
        grid-row: span 2;
    }
}

.category-card-featured {
    min-height: 500px;
}

@media (max-width: 767px) {
    .category-card-featured {
        min-height: 300px;
    }
}

/* ===== FEATURED ASYMMETRIC PRODUCT IMAGES ===== */
.featured-asymmetric .product-card:first-child .product-image {
    aspect-ratio: 3/5;
    min-height: 600px;
}

@media (max-width: 767px) {
    .featured-asymmetric .product-card:first-child .product-image {
        min-height: 400px;
    }
}


/* ===== CART PAGE ===== */
.cart-page {
    padding: var(--space-3xl) 0;
    margin-top: 72px;
    background-color: var(--color-cream);
    min-height: 100vh;
}

.page-title {
    font-family: var(--font-primary);
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: var(--space-2xl);
}

.cart-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 1024px) {
    .cart-layout {
        grid-template-columns: 1.5fr 1fr;
    }
}

.cart-items {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
}

.cart-item {
    background-color: var(--color-white);
    padding: var(--space-lg);
    border-radius: 8px;
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: var(--space-lg);
    transition: box-shadow var(--duration-base) var(--ease-elegant);
}

@media (min-width: 768px) {
    .cart-item {
        grid-template-columns: 150px 1fr;
        padding: var(--space-xl);
    }
}

.cart-item:hover {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
}

.cart-item-image {
    aspect-ratio: 3/4;
    overflow: hidden;
    border-radius: 4px;
}

.cart-item-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.cart-item-details {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
}

.cart-item-name {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
}

.cart-item-options {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
}

.cart-item-price {
    font-size: 1.125rem;
    font-weight: 500;
    margin-top: var(--space-xs);
}

.cart-item-actions {
    display: flex;
    align-items: center;
    gap: var(--space-lg);
    margin-top: auto;
}

.quantity-selector {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    border: 1px solid var(--color-text-secondary);
    border-radius: 4px;
    padding: var(--space-xs);
}

.quantity-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    color: var(--color-text-primary);
    transition: background-color var(--duration-base) var(--ease-elegant);
}

.quantity-btn:hover {
    background-color: var(--color-cream);
}

.quantity-input {
    width: 50px;
    text-align: center;
    border: none;
    font-family: inherit;
    font-size: 1rem;
    -moz-appearance: textfield;
}

.quantity-input::-webkit-outer-spin-button,
.quantity-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

.quantity-input:focus {
    outline: none;
}

.cart-item-remove {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    transition: color var(--duration-base) var(--ease-elegant);
}

.cart-item-remove:hover {
    color: var(--color-accent);
}

.cart-summary {
    background-color: var(--color-white);
    padding: var(--space-xl);
    border-radius: 8px;
    height: fit-content;
    position: sticky;
    top: 100px;
}

.cart-summary-title {
    font-family: var(--font-primary);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-lg);
}

.cart-summary-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: var(--space-md);
    font-size: 1rem;
}

.cart-summary-row span:first-child {
    color: var(--color-text-secondary);
}

.free-shipping {
    color: #88C9A0;
    font-weight: 500;
}

.cart-summary-total {
    display: flex;
    justify-content: space-between;
    padding-top: var(--space-lg);
    margin-top: var(--space-lg);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: var(--space-xl);
}

.cart-checkout-btn {
    display: block;
    width: 100%;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    text-align: center;
    transition: transform var(--duration-base) var(--ease-elegant);
    margin-bottom: var(--space-md);
}

.cart-checkout-btn:hover {
    transform: scale(0.98);
    opacity: 1;
}

.cart-continue-shopping {
    display: block;
    text-align: center;
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xl);
    text-decoration: underline;
    text-underline-offset: 4px;
}

.promo-code {
    display: flex;
    gap: var(--space-sm);
    padding-top: var(--space-lg);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
}

.promo-input {
    flex: 1;
    padding: var(--space-md);
    border: 1px solid var(--color-text-secondary);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.875rem;
}

.promo-input:focus {
    outline: none;
    border-color: var(--color-black);
}

.promo-btn {
    padding: var(--space-md) var(--space-lg);
    background-color: transparent;
    border: 1px solid var(--color-black);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: all var(--duration-base) var(--ease-elegant);
}

.promo-btn:hover {
    background-color: var(--color-black);
    color: var(--color-white);
}


/* ===== SHOP PAGE ===== */
.shop-page {
    padding: var(--space-3xl) 0;
    margin-top: 72px;
    background-color: var(--color-white);
    min-height: 100vh;
}

.shop-header {
    text-align: center;
    margin-bottom: var(--space-2xl);
}

.shop-subtitle {
    font-size: 1.125rem;
    color: var(--color-text-secondary);
    margin-top: var(--space-md);
}

.shop-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 1024px) {
    .shop-layout {
        grid-template-columns: 280px 1fr;
    }
}

/* Filters */
.shop-filters {
    background-color: var(--color-cream);
    padding: var(--space-xl);
    border-radius: 8px;
    height: fit-content;
    position: sticky;
    top: 100px;
}

@media (max-width: 1023px) {
    .shop-filters {
        display: none;
    }
}

.filter-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-lg);
    padding-bottom: var(--space-md);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
}

.filter-title {
    font-family: var(--font-primary);
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.05em;
}

.filter-clear {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    text-decoration: underline;
    text-underline-offset: 2px;
}

.filter-group {
    margin-bottom: var(--space-xl);
    padding-bottom: var(--space-lg);
    border-bottom: 1px solid rgba(0, 0, 0, 0.05);
}

.filter-group:last-child {
    border-bottom: none;
}

.filter-group-title {
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: var(--space-md);
}

.filter-options {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
}

.filter-option {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    cursor: pointer;
    font-size: 0.95rem;
}

.filter-option input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.color-filters {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-sm);
}

.color-filter {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform var(--duration-base) var(--ease-elegant);
    position: relative;
}

.color-filter:hover {
    transform: scale(1.1);
}

.color-filter.active::after {
    content: '✓';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--color-white);
    font-size: 1rem;
}

/* Shop Content */
.shop-content {
    width: 100%;
}

.shop-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-xl);
    padding-bottom: var(--space-md);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    flex-wrap: wrap;
    gap: var(--space-md);
}

.shop-results {
    font-size: 0.95rem;
    color: var(--color-text-secondary);
}

.shop-sort {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: 0.95rem;
}

.sort-select {
    padding: var(--space-xs) var(--space-md);
    border: 1px solid var(--color-text-secondary);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.95rem;
    background-color: var(--color-white);
    cursor: pointer;
}

.sort-select:focus {
    outline: none;
    border-color: var(--color-black);
}

.filter-toggle-mobile {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    padding: var(--space-sm) var(--space-md);
    border: 1px solid var(--color-black);
    border-radius: 4px;
    font-size: 0.875rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

@media (min-width: 1024px) {
    .filter-toggle-mobile {
        display: none;
    }
}

/* Pagination */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: var(--space-sm);
    margin-top: var(--space-3xl);
}

.pagination-btn,
.pagination-number {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 4px;
    background-color: var(--color-white);
    font-size: 0.95rem;
    transition: all var(--duration-base) var(--ease-elegant);
}

.pagination-btn:hover:not(:disabled),
.pagination-number:hover {
    border-color: var(--color-black);
    background-color: var(--color-cream);
}

.pagination-number.active {
    background-color: var(--color-black);
    color: var(--color-white);
    border-color: var(--color-black);
}

.pagination-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

.pagination-dots {
    padding: 0 var(--space-xs);
    color: var(--color-text-secondary);
}


/* ===== ABOUT PAGE ===== */
.about-hero {
    height: 60vh;
    background: linear-gradient(135deg, var(--color-blush) 0%, var(--color-lavender) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 72px;
    text-align: center;
}

.about-hero-title {
    font-family: var(--font-primary);
    font-size: clamp(3rem, 8vw, 5rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
}

.about-hero-subtitle {
    font-size: clamp(1rem, 2vw, 1.25rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--color-text-secondary);
}

.about-story {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
}

.about-story-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-2xl);
    align-items: center;
}

@media (min-width: 1024px) {
    .about-story-grid {
        grid-template-columns: 1fr 1fr;
    }
}

.about-story-image {
    border-radius: 8px;
    overflow: hidden;
}

.about-story-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.about-section-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-lg);
}

.about-text {
    font-size: 1.125rem;
    line-height: 1.8;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-lg);
}

.about-values {
    padding: var(--space-3xl) 0;
    background-color: var(--color-cream);
}

.values-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 768px) {
    .values-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (min-width: 1024px) {
    .values-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

.value-card {
    background-color: var(--color-white);
    padding: var(--space-xl);
    border-radius: 8px;
    text-align: center;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.value-card:hover {
    transform: translateY(-8px);
}

.value-icon {
    margin-bottom: var(--space-lg);
    color: var(--color-accent);
}

.value-title {
    font-family: var(--font-primary);
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
}

.value-description {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--color-text-secondary);
}

.about-process {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
}

.about-process-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-2xl);
    align-items: center;
}

@media (min-width: 1024px) {
    .about-process-grid {
        grid-template-columns: 1fr 1fr;
    }
}

.about-process-image {
    border-radius: 8px;
    overflow: hidden;
}

.about-process-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.process-steps {
    display: flex;
    flex-direction: column;
    gap: var(--space-xl);
}

.process-step {
    display: flex;
    gap: var(--space-lg);
}

.process-number {
    font-family: var(--font-primary);
    font-size: 3rem;
    font-weight: 400;
    color: var(--color-accent);
    line-height: 1;
}

.process-step-title {
    font-family: var(--font-primary);
    font-size: 1.5rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-sm);
}

.process-step-text {
    font-size: 1rem;
    line-height: 1.6;
    color: var(--color-text-secondary);
}

.about-team {
    padding: var(--space-3xl) 0;
    background-color: var(--color-cream);
}

.about-team-intro {
    text-align: center;
    font-size: 1.125rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-2xl);
}

.team-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 768px) {
    .team-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (min-width: 1024px) {
    .team-grid {
        grid-template-columns: repeat(4, 1fr);
    }
}

.team-member {
    text-align: center;
}

.team-member-image {
    aspect-ratio: 3/4;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: var(--space-md);
}

.team-member-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform var(--duration-slow) var(--ease-elegant);
}

.team-member:hover .team-member-image img {
    transform: scale(1.05);
}

.team-member-name {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-xs);
}

.team-member-role {
    font-size: 0.95rem;
    color: var(--color-text-secondary);
}

.about-cta {
    padding: var(--space-3xl) 0;
    background-color: var(--color-white);
    text-align: center;
}

.about-cta-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-md);
}

.about-cta-text {
    font-size: 1.125rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xl);
}

.about-cta-btn {
    display: inline-block;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform var(--duration-base) var(--ease-elegant);
}

.about-cta-btn:hover {
    transform: scale(0.98);
    opacity: 1;
}


/* ===== CHECKOUT PAGE ===== */
.checkout-page {
    padding: var(--space-3xl) 0;
    margin-top: 72px;
    background-color: var(--color-cream);
    min-height: 100vh;
}

.checkout-progress {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: var(--space-lg);
    margin-bottom: var(--space-3xl);
}

.progress-step {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    opacity: 0.4;
    transition: opacity var(--duration-base) var(--ease-elegant);
}

.progress-step.active,
.progress-step.completed {
    opacity: 1;
}

.progress-number {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid var(--color-black);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 500;
    background-color: var(--color-white);
    transition: all var(--duration-base) var(--ease-elegant);
}

.progress-step.active .progress-number {
    background-color: var(--color-black);
    color: var(--color-white);
}

.progress-step.completed .progress-number {
    background-color: var(--color-accent);
    border-color: var(--color-accent);
    color: var(--color-white);
}

.progress-label {
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
}

@media (max-width: 767px) {
    .progress-label {
        display: none;
    }
}

.progress-line {
    width: 60px;
    height: 2px;
    background-color: rgba(0, 0, 0, 0.2);
}

.checkout-layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-xl);
}

@media (min-width: 1024px) {
    .checkout-layout {
        grid-template-columns: 1.5fr 1fr;
    }
}

.checkout-step {
    background-color: var(--color-white);
    padding: var(--space-xl);
    border-radius: 8px;
}

@media (min-width: 768px) {
    .checkout-step {
        padding: var(--space-2xl);
    }
}

.checkout-title {
    font-family: var(--font-primary);
    font-size: clamp(2rem, 4vw, 2.5rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-xl);
}

.checkout-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: var(--space-sm);
}

.form-row {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-md);
}

@media (min-width: 768px) {
    .form-row {
        grid-template-columns: 1fr 1fr;
    }
}

.form-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--color-text-secondary);
    font-weight: 500;
}

.form-input {
    width: 100%;
    padding: var(--space-md);
    border: 1px solid rgba(0, 0, 0, 0.2);
    border-radius: 4px;
    font-family: inherit;
    font-size: 1rem;
    transition: border-color var(--duration-base) var(--ease-elegant);
}

.form-input:focus {
    outline: none;
    border-color: var(--color-black);
}

.checkout-btn {
    width: 100%;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: transform var(--duration-base) var(--ease-elegant);
    text-decoration: none;
    box-sizing: border-box;
}

.checkout-btn:hover {
    transform: scale(0.98);
    opacity: 1;
}

.checkout-btn-secondary {
    width: 100%;
    padding: var(--space-md) var(--space-xl);
    background-color: transparent;
    color: var(--color-black);
    border: 1px solid var(--color-black);
    font-size: 0.875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--duration-base) var(--ease-elegant);
    text-decoration: none;
    box-sizing: border-box;
}

.checkout-btn-secondary:hover {
    background-color: var(--color-black);
    color: var(--color-white);
    opacity: 1;
}

.checkout-actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-md);
    margin-top: var(--space-lg);
    align-items: stretch;
}

@media (min-width: 768px) {
    .checkout-actions {
        grid-template-columns: 1fr 1fr;
    }
}

.checkout-actions > * {
    height: 100%;
    min-height: 52px;
}

/* Payment Step */
.payment-methods {
    padding: var(--space-lg);
    background-color: var(--color-cream);
    border-radius: 4px;
    margin: var(--space-lg) 0;
}

.payment-methods-label {
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: var(--space-md);
}

.payment-icons {
    display: flex;
    gap: var(--space-md);
    flex-wrap: wrap;
}

.payment-icon {
    padding: var(--space-xs) var(--space-md);
    background-color: var(--color-white);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 4px;
    font-size: 0.875rem;
}

.security-badge {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: var(--space-md);
    background-color: var(--color-cream);
    border-radius: 4px;
    font-size: 0.875rem;
    color: var(--color-text-secondary);
}

.security-badge svg {
    color: var(--color-accent);
}

/* Review Step */
.review-section {
    padding: var(--space-lg);
    background-color: var(--color-cream);
    border-radius: 4px;
    margin-bottom: var(--space-lg);
}

.review-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--space-md);
}

.review-section-title {
    font-family: var(--font-primary);
    font-size: 1.25rem;
    font-weight: 400;
    letter-spacing: 0.05em;
}

.review-edit {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    text-decoration: underline;
    text-underline-offset: 2px;
    cursor: pointer;
}

.review-content {
    font-size: 0.95rem;
    line-height: 1.6;
}

.review-content p {
    margin-bottom: var(--space-xs);
}

.review-items {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
    margin-top: var(--space-md);
}

.review-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: var(--space-md);
    align-items: center;
}

.review-item img {
    width: 80px;
    height: 100px;
    object-fit: cover;
    border-radius: 4px;
}

.review-item-details h4 {
    font-size: 1rem;
    margin-bottom: var(--space-xs);
}

.review-item-details p {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
}

.review-item-price {
    font-size: 1rem;
    font-weight: 500;
}

/* Order Summary Sidebar */
.order-summary {
    background-color: var(--color-white);
    padding: var(--space-xl);
    border-radius: 8px;
    height: fit-content;
    position: sticky;
    top: 100px;
}

.order-summary-title {
    font-family: var(--font-primary);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-lg);
}

.order-items {
    display: flex;
    flex-direction: column;
    gap: var(--space-lg);
    padding-bottom: var(--space-lg);
    margin-bottom: var(--space-lg);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
}

.order-item {
    display: flex;
    gap: var(--space-md);
}

.order-item img {
    width: 80px;
    height: 100px;
    object-fit: cover;
    border-radius: 4px;
}

.order-item-details {
    flex: 1;
}

.order-item-details h3 {
    font-size: 1rem;
    margin-bottom: var(--space-xs);
}

.order-item-details p {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
}

.order-item-price {
    font-size: 1rem;
    font-weight: 500;
}

.order-totals {
    margin-bottom: var(--space-lg);
}

.order-total-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: var(--space-md);
    font-size: 0.95rem;
}

.order-total-row span:first-child {
    color: var(--color-text-secondary);
}

.free-text {
    color: #88C9A0;
    font-weight: 500;
}

.order-total-final {
    display: flex;
    justify-content: space-between;
    padding-top: var(--space-lg);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    font-size: 1.5rem;
    font-weight: 500;
}

.promo-code-box {
    display: flex;
    gap: var(--space-sm);
    padding-top: var(--space-lg);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
}

.promo-input-checkout {
    flex: 1;
    padding: var(--space-md);
    border: 1px solid rgba(0, 0, 0, 0.2);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.875rem;
}

.promo-input-checkout:focus {
    outline: none;
    border-color: var(--color-black);
}

.promo-btn-checkout {
    padding: var(--space-md) var(--space-lg);
    background-color: transparent;
    border: 1px solid var(--color-black);
    font-size: 0.875rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    transition: all var(--duration-base) var(--ease-elegant);
}

.promo-btn-checkout:hover {
    background-color: var(--color-black);
    color: var(--color-white);
}


/* ===== AUTHENTICATION PAGES ===== */
.auth-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-xl) var(--space-lg);
    margin-top: 72px;
    background: linear-gradient(135deg, var(--color-blush) 0%, var(--color-lavender) 100%);
}

.auth-container {
    width: 100%;
    max-width: 600px;
}

.auth-box {
    background-color: var(--color-white);
    padding: var(--space-3xl) var(--space-xl);
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
}

@media (min-width: 768px) {
    .auth-box {
        padding: 5rem 4rem;
    }
}

.auth-title {
    font-family: var(--font-primary);
    font-size: clamp(2.5rem, 5vw, 3rem);
    font-weight: 400;
    letter-spacing: 0.05em;
    text-align: center;
    margin-bottom: var(--space-md);
}

.auth-subtitle {
    text-align: center;
    color: var(--color-text-secondary);
    font-size: 1.125rem;
    margin-bottom: var(--space-2xl);
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: var(--space-xl);
}

.auth-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: var(--space-sm);
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    font-size: 0.95rem;
    cursor: pointer;
}

.checkbox-input {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.auth-link {
    font-size: 0.95rem;
    color: var(--color-text-secondary);
    text-decoration: underline;
    text-underline-offset: 2px;
}

.auth-link:hover {
    color: var(--color-black);
}

.auth-btn {
    width: 100%;
    padding: var(--space-md) var(--space-xl);
    background-color: var(--color-black);
    color: var(--color-white);
    font-size: 0.875rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: transform var(--duration-base) var(--ease-elegant);
    margin-top: var(--space-md);
}

.auth-btn:hover {
    transform: scale(0.98);
}

.auth-divider {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: var(--space-xl) 0;
    color: var(--color-text-secondary);
    font-size: 0.875rem;
}

.auth-divider::before,
.auth-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background-color: rgba(0, 0, 0, 0.1);
}

.auth-social {
    display: flex;
    flex-direction: column;
    gap: var(--space-md);
}

.social-btn {
    width: 100%;
    padding: var(--space-md) var(--space-lg);
    background-color: var(--color-white);
    border: 1px solid rgba(0, 0, 0, 0.2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    font-size: 0.95rem;
    cursor: pointer;
    transition: all var(--duration-base) var(--ease-elegant);
}

.social-btn:hover {
    background-color: var(--color-cream);
    border-color: var(--color-black);
}

.auth-footer {
    text-align: center;
    margin-top: var(--space-xl);
    font-size: 0.95rem;
    color: var(--color-text-secondary);
}

.auth-link-bold {
    color: var(--color-black);
    font-weight: 500;
    text-decoration: underline;
    text-underline-offset: 2px;
}

.auth-link-bold:hover {
    opacity: 0.7;
}

    padding: var(--space-3xl) 0;

}

.confirmation-details {

.confirmation-detail-row {

.confirmation-detail-row:last-child {

.detail-label {

.detail-value {

.confirmation-message {

.confirmation-message p {

.confirmation-message p:last-child {

.confirmation-summary {

    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    margin-bottom: var(--space-xl);
}

.confirmation-summary-title {
    font-family: var(--font-primary);
    font-size: 1.75rem;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-bottom: var(--space-lg);

.confirmation-items {

    gap: var(--space-lg);

.confirmation-item {

}

.confirmation-item img {

.confirmation-item-details h3 {

    margin-bottom: var(--space-xs);
}

.confirmation-item-details p {
    font-size: 0.875rem;
    color: var(--color-text-secondary);
    margin-bottom: var(--space-xs);
}

.confirmation-item-price {
    font-size: 1rem;
    font-weight: 500;
}

.confirmation-totals {

    border-top: 1px solid rgba(0, 0, 0, 0.1);
}

.confirmation-total-row {

    justify-content: space-between;

.confirmation-total-row span:first-child {

.confirmation-total-final {

    padding-top: var(--space-lg);
    margin-top: var(--space-md);

                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" placeholder="your@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" placeholder="Enter your password" required>
                    </div>

                    <div class="auth-options">
                        <label class="checkbox-label">
                            <input type="checkbox" class="checkbox-input">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="auth-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-btn">Sign In</button>
                </form>

                <div class="auth-divider">
                    <span>or</span>
                </div>

                <div class="auth-social">
                    <button class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M20 10.2c0-5.5-4.5-10-10-10S0 4.7 0 10.2c0 5 3.7 9.1 8.4 9.9v-7h-2.5v-2.9h2.5V8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6v1.8h2.8l-.4 2.9h-2.3v7c4.7-.8 8.4-4.9 8.4-9.9z"/>
                        </svg>
                        Continue with Facebook
                    </button>
                    <button class="social-btn">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M19.6 10.2c0-.7-.1-1.5-.2-2.2H10v4.2h5.4c-.2 1.2-1 2.3-2.1 3v2.5h3.4c2-1.8 3.1-4.5 3.1-7.5z"/>
                            <path d="M10 20c2.8 0 5.2-.9 6.9-2.5l-3.4-2.6c-.9.6-2.1 1-3.5 1-2.7 0-5-1.8-5.8-4.3H.7v2.7C2.4 17.8 5.9 20 10 20z"/>
                            <path d="M4.2 11.6c-.2-.6-.3-1.2-.3-1.8s.1-1.2.3-1.8V5.3H.7C.3 6.5 0 7.7 0 10s.3 3.5.7 4.7l3.5-2.7z"/>
                            <path d="M10 4c1.5 0 2.9.5 4 1.5l3-3C15.2.9 12.8 0 10 0 5.9 0 2.4 2.2.7 5.3l3.5 2.7C5 5.8 7.3 4 10 4z"/>
                        </svg>
                        Continue with Google
                    </button>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="signup.html" class="auth-link-bold">Sign up</a>
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
